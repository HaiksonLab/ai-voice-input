[Whisper]
; API-ключ OpenAI (https://platform.openai.com/api-keys)
ApiKey=sk-YOUR-API-KEY-HERE

; Модель транскрипции. Примеры: whisper-1, gpt-4o-transcribe, gpt-4o-mini-transcribe
; Полный актуальный список моделей: https://platform.openai.com/docs/models
Model=gpt-4o-transcribe

; Минимальная длительность записи в мс (короче — считается отменой, 0 = отключено)
MinRecordMs=1000

; Звуки (путь к WAV, или оставить пустым для отключения)
SoundStart=C:\Windows\Media\Speech On.wav
SoundStop=C:\Windows\Media\Speech Off.wav
SoundCancel=C:\Windows\Media\Speech Misrecognition.wav

; Подсказка для модели (опционально, улучшает распознавание терминов и стиля речи)
; Оставьте пустым если не нужно
Prompt=Техническое обсуждение на русском и английском. Возможны разговорная речь, смешение русского и английского, программирование, Android, embedded, веб-разработка, сети и электроника. Термины: CLAUDE.md, API, REST API, JSON, HTTP, HTTPS, WebSocket, TCP, UDP, MQTT, UART, SPI, I2C, BLE, Bluetooth, Wi-Fi, GPS, ESP32, ESP8266, PlatformIO, Arduino, Kotlin, Java, C++, JavaScript, TypeScript, Node.js, Express, Nginx, Redis, BullMQ, PostgreSQL, MySQL, MariaDB, Prisma, Docker, Linux, Android, protobuf, AES, CTR, nonce, firmware, backend, frontend, mesh, LoRa, Meshtastic, Voron. Числа и технические значения по возможности записываются цифрами.
