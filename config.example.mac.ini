[Whisper]
; OpenAI API key (https://platform.openai.com/api-keys)
ApiKey=sk-YOUR-API-KEY-HERE

; Transcription model. Examples: whisper-1, gpt-4o-transcribe, gpt-4o-mini-transcribe
; Full model list: https://platform.openai.com/docs/models
Model=gpt-4o-transcribe

; Hotkey to start/stop recording
; Format: key or modifier+key (e.g., f9, ctrl+f9, cmd+shift+f9)
; Available modifiers: ctrl, cmd, alt (option), shift
; Available keys: f1-f20, a-z, 0-9, home, end, pageup, pagedown,
;   insert, delete, scrolllock, pause, capslock, printscreen
RecordKey=f9

; Minimum recording duration in ms (shorter = treated as cancel, 0 = disabled)
MinRecordMs=1000

; Sound files (path to audio file, or leave empty to use system sounds)
; macOS supports: .aiff, .wav, .mp3, .m4a
; Example with system sounds:
;SoundStart=/System/Library/Sounds/Tink.aiff
;SoundStop=/System/Library/Sounds/Pop.aiff
;SoundCancel=/System/Library/Sounds/Basso.aiff
SoundStart=
SoundStop=
SoundCancel=

; Hint for the model (optional, improves recognition of domain-specific terms)
; Leave empty if not needed
Prompt=

; SOCKS5h proxy for OpenAI API requests (leave empty if not needed)
; Example: socks5h://login:pass@127.0.0.1:1080
Proxy=
